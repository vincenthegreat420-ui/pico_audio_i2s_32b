name: Build Audio Firmware

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-pico:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM Toolchain & CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential cmake

      - name: Checkout Old Stable Pico SDK
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/pico-sdk
          ref: 1.5.1
          submodules: recursive
          path: pico-sdk

      - name: Patch and Build Sine Wave Sample
        run: |
          # Переносим SDK в нужную папку
          mv pico-sdk /home/runner/pico-sdk
          
          # Переходим в папку сэмпла
          cd samples/sine_wave_i2s_32b
          
          # Переписываем CMakeLists.txt на чистый вариант без костылей автора
          cat << 'EOF' > CMakeLists.txt
          cmake_minimum_required(VERSION 3.13)
          
          # Подключаем родной импорт из Pico SDK напрямую
          include($ENV{PICO_SDK_PATH}/external/pico_sdk_import.cmake)
          
          project(sine_wave_i2s_32b C CXX ASM)
          
          pico_sdk_init()
          
          add_executable(sine_wave_i2s_32b
              main.c
          )
          
          # Подключаем саму библиотеку 32-битного аудио
          target_link_libraries(sine_wave_i2s_32b pico_stdlib hardware_pio hardware_dma)
          
          # Включаем generation UF2 файла для прошивки
          pico_add_extra_outputs(sine_wave_i2s_32b)
          EOF
          
          # Запускаем сборку (убрали ручной поиск тулчейна к чертям)
          mkdir build && cd build
          export PICO_SDK_PATH=/home/runner/pico-sdk
          cmake ..
          make -j$(nproc)

      - name: Upload Ready UF2 Firmware
        uses: actions/upload-artifact@v4
        with:
          name: pico-audio-firmware
          path: |
            samples/sine_wave_i2s_32b/build/**/*.uf2
