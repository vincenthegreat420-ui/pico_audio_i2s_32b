name: Build Audio Firmware

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-pico:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM Toolchain & CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential cmake wget unzip

      - name: Download Raspberry Pi Pico SDK Archive
        run: |
          mkdir -p /home/runner/pico-sdk
          PART1="https://github.com"
          PART2="/raspberrypi/pico-sdk/archive/refs/tags/2.1.1.zip"
          FULL_URL="${PART1}${PART2}"
          
          wget $FULL_URL -O /home/runner/pico-sdk.zip
          unzip /home/runner/pico-sdk.zip -d /home/runner/
          mv /home/runner/pico-sdk-2.1.1/* /home/runner/pico-sdk/

      - name: Patch and Build Sine Wave Sample
        run: |
          # Переходим в папку сэмпла
          cd samples/sine_wave_i2s_32b
          
          # Полностью переписываем CMakeLists.txt на чистый и рабочий вариант без костылей автора
          cat << 'EOF' > CMakeLists.txt
          cmake_minimum_required(VERSION 3.13)
          
          # Подключаем родной импорт из Pico SDK напрямую
          include($ENV{PICO_SDK_PATH}/external/pico_sdk_import.cmake)
          
          project(sine_wave_i2s_32b C CXX ASM)
          
          pico_sdk_init()
          
          add_executable(sine_wave_i2s_32b
              main.c
          )
          
          # Подключаем саму библиотеку 32-битного аудио
          target_link_libraries(sine_wave_i2s_32b pico_stdlib hardware_pio hardware_dma)
          
          # Включаем генерацию UF2 файла для прошивки
          pico_add_extra_outputs(sine_wave_i2s_32b)
          EOF
          
          # Запускаем сборку
          mkdir build && cd build
          export PICO_SDK_PATH=/home/runner/pico-sdk
          cmake -DCMAKE_TOOLCHAIN_FILE=/home/runner/pico-sdk/cmake/toolchains/pico_arm_gcc.cmake ..
          make -j$(nproc)

      - name: Upload Ready UF2 Firmware
        uses: actions/upload-artifact@v4
        with:
          name: pico-audio-firmware
          path: |
            samples/sine_wave_i2s_32b/build/**/*.uf2
