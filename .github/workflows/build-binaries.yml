name: Build Audio Firmware

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-pico:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM Toolchain & CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential cmake wget unzip

      - name: Download Raspberry Pi Pico SDK Archive
        run: |
          mkdir -p /home/runner/pico-sdk
          PART1="https://github.com"
          PART2="/raspberrypi/pico-sdk/archive/refs/tags/2.1.1.zip"
          FULL_URL="${PART1}${PART2}"
          
          wget $FULL_URL -O /home/runner/pico-sdk.zip
          unzip /home/runner/pico-sdk.zip -d /home/runner/
          mv /home/runner/pico-sdk-2.1.1/* /home/runner/pico-sdk/

      - name: Build Samples for RP2040 (Pico 1)
        run: |
          mkdir build_rp2040
          cd build_rp2040
          
          # Запускаем сборку через универсальный ARM-тулчейн самого CMake
          cmake -DPICO_SDK_PATH=/home/runner/pico-sdk \
                -DCMAKE_TOOLCHAIN_FILE=/home/runner/pico-sdk/cmake/toolchains/pico_arm_gcc.cmake \
                ..
          make -j$(nproc)

      - name: Upload Ready UF2 Firmware
        uses: actions/upload-artifact@v4
        with:
          name: pico-audio-firmware
          path: |
            build_rp2040/**/*.uf2
