name: Build Audio Firmware

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  SDK_URL: https://github.com

jobs:
  build-pico:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM Toolchain & CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential cmake

      - name: Setup Raspberry Pi Pico SDK
        run: |
          git clone --depth 1 --branch 2.1.1 $SDK_URL /home/runner/pico-sdk
          cd /home/runner/pico-sdk
          git submodule update --init
          echo "PICO_SDK_PATH=/home/runner/pico-sdk" >> $GITHUB_ENV

      - name: Build Samples for RP2040
        run: |
          mkdir build_rp2040
          cd build_rp2040
          cmake ..
          make -j$(nproc)

      - name: Build Samples for RP2350
        run: |
          mkdir build_rp2350
          cd build_rp2350
          cmake -DPICO_PLATFORM=rp2350 -DPICO_BOARD=pico2 ..
          make -j$(nproc)

      - name: Upload Ready UF2 Firmware
        uses: actions/upload-artifact@v4
        with:
          name: pico-audio-firmware
          path: |
            build_rp2040/**/*.uf2
            build_rp2350/**/*.uf2
