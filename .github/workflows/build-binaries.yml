name: Build Audio Firmware

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-pico:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM Toolchain & CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential cmake

      - name: Checkout Old Stable Pico SDK
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/pico-sdk
          ref: 1.5.1
          submodules: recursive
          path: pico-sdk

      - name: Patch and Build Sine Wave Sample
        run: |
          mv pico-sdk /home/runner/pico-sdk
          cd samples/sine_wave_i2s_32b
          
          # СМОТРИМ ЧТО ТУТ ЛЕЖИТ НА САМОМ ДЕЛЕ
          echo "=== СПИСОК ФАЙЛОВ В ПАПКЕ СЭМПЛА ==="
          ls -la
          echo "====================================="
          
          echo "=== СМОТРИМ ОРИГИНАЛЬНЫЙ СМЕЙК ==="
          cat CMakeLists.txt || true
          echo "=================================="

          cat << 'EOF' > CMakeLists.txt
          cmake_minimum_required(VERSION 3.13)
          include($ENV{PICO_SDK_PATH}/external/pico_sdk_import.cmake)
          project(sine_wave_i2s_32b C CXX ASM)
          pico_sdk_init()
          
          # Сюда мы впишем правильный файл после того как увидим лог ls
          add_executable(sine_wave_i2s_32b
              main.cpp
          )
          
          target_link_libraries(sine_wave_i2s_32b pico_stdlib hardware_pio hardware_dma)
          pico_add_extra_outputs(sine_wave_i2s_32b)
          EOF
          
          mkdir build && cd build
          export PICO_SDK_PATH=/home/runner/pico-sdk
          cmake ..
          make -j$(nproc)
